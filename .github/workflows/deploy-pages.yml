name: Deploy GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Build static artifact
        env:
          COACH_API_URL: ${{ vars.COACH_API_URL }}
        run: |
          mkdir -p dist
          cp app.js coach.js index.html storage.js style.css README.md dist/
          if [ -n "$COACH_API_URL" ]; then
            CONFIG_VALUE="\"$COACH_API_URL\""
          else
            CONFIG_VALUE="null"
          fi
          cat > dist/config.js <<EOF
          window.OPERATION_SWOLE_CONFIG = {
            coachApiUrl: ${CONFIG_VALUE},
          };
          EOF

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4